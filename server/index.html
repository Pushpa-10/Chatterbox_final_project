<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatterbox</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Main Card */
.container {
    width: 750px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Header */
.header {
    background: #4a55a2;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* Controls */
#controls {
    padding: 12px;
    background: #f3f4f6;
    display: flex;
    gap: 8px;
}

#controls input {
    flex: 1;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

#controls button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: white;
    font-weight: 500;
}

.register { background: #10b981; }
.login { background: #3b82f6; }

/* Chat Area */
#chat {
    height: 350px;
    padding: 15px;
    overflow-y: auto;
    background: #fafafa;
}

/* Message Bubbles */
.msg {
    background: #e5e7eb;
    padding: 10px 14px;
    border-radius: 16px;
    margin: 6px 0;
    max-width: 75%;
}

.system {
    text-align: center;
    color: #777;
    font-style: italic;
    font-size: 14px;
}

/* Input Area */
.input-area {
    display: flex;
    padding: 10px;
    gap: 10px;
    border-top: 1px solid #ddd;
}

#message {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
}

#send {
    padding: 10px 16px;
    border: none;
    border-radius: 20px;
    background: #4a55a2;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">Chatterbox</div>

<div id="controls">
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button class="register" onclick="auth('register')">Register</button>
<button class="login" onclick="auth('login')">Login</button>
</div>

<div id="chat"></div>

<div class="input-area">
<input type="text" id="message" placeholder="Type a message..." 
onkeypress="if(event.key==='Enter') sendMessage()">
<button id="send" onclick="sendMessage()">Send</button>
</div>

</div>

<script>
let ws;
let token;

async function auth(type) {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch(`/${type}`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({username,password})
    });

    const data = await res.json();

    if(type==='login' && data.token){
        token=data.token;
        addMessage("Login successful! Connecting...","system");
        connect();
    } else {
        addMessage(data.detail || "Done","system");
    }
  } catch {
    addMessage("Server error","system");
  }
}

function connect(){
  const protocol = location.protocol==="https:"?"wss://":"ws://";
  ws=new WebSocket(protocol+location.host+"/ws/"+token);

  ws.onmessage=(e)=>addMessage(e.data);
  ws.onclose=()=>addMessage("Disconnected","system");
  ws.onerror=()=>addMessage("WebSocket error","system");
}

function sendMessage(){
  const input=document.getElementById("message");
  if(ws && ws.readyState===WebSocket.OPEN && input.value.trim()){
      ws.send(input.value);
      input.value="";
  }
}

function addMessage(text,cls="msg"){
  const chat=document.getElementById("chat");
  const div=document.createElement("div");
  div.className=cls;
  div.textContent=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
